databases:
  # ── Render PostgreSQL ─────────────────────────────────────────
  - name: elitebuilders-db
    plan: free
    databaseName: elitebuilders
    user: elitebuilders

services:
  # ── Backend: FastAPI ─────────────────────────────────────────
  - type: web
    name: elitebuilders-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      # Automatically injected by Render when linked to elitebuilders-db
      - key: DATABASE_URL
        fromDatabase:
          name: elitebuilders-db
          property: connectionString
      # Clerk — from Clerk Dashboard → API Keys → "JWKS URL"
      - key: CLERK_JWKS_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama3-70b-8192
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      # Set to your Render frontend URL after first deploy
      # e.g. https://elitebuilders-frontend.onrender.com
      - key: FRONTEND_URL
        sync: false

  # ── Frontend: React + Vite (served via `serve`) ──────────────
  # Render blueprints don't support type:static — we use a Node
  # web service with `npx serve -s dist` instead.
  # The -s flag enables SPA mode (all routes → index.html).
  - type: web
    name: elitebuilders-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    plan: free
    envVars:
      # Set to the backend web service URL after first deploy
      # e.g. https://elitebuilders-backend.onrender.com
      - key: VITE_API_URL
        sync: false
      # Clerk — from Clerk Dashboard → API Keys → "Publishable key"
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
