services:
  # ── Backend: FastAPI ─────────────────────────────────────────
  - type: web
    name: elitebuilders-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama3-70b-8192
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      # Set this to your Render frontend URL after first deploy
      # e.g. https://elitebuilders-frontend.onrender.com
      - key: FRONTEND_URL
        sync: false

  # ── Frontend: React + Vite (served via `serve`) ──────────────
  # Render blueprints don't support type:static — we use a Node
  # web service with `npx serve -s dist` instead.
  # The -s flag enables SPA mode (all routes → index.html).
  - type: web
    name: elitebuilders-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    plan: free
    envVars:
      # Set to the backend web service URL after first deploy
      # e.g. https://elitebuilders-backend.onrender.com
      - key: VITE_API_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
